<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Dimas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#667eea,#764ba2,#6dd5ed,#2193b0,#91eae4);
background-size:400% 400%;
animation:gradientMove 15s ease infinite;
color:white;
overflow:hidden;
}

/* gradient animation */

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* card */

.card{
width:470px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(14px);
box-shadow:0 20px 40px rgba(0,0,0,0.25);
text-align:center;
transition:0.4s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 25px 50px rgba(0,0,0,0.35);
}

h1{
font-size:32px;
margin-bottom:8px;
}

.subtitle{
font-size:15px;
opacity:0.85;
margin-bottom:20px;
}

#clock{
font-size:14px;
opacity:0.8;
margin-bottom:20px;
}

#text{
font-size:18px;
line-height:1.7;
min-height:120px;
}

button{
margin-top:20px;
padding:12px 26px;
border:none;
border-radius:25px;
font-size:15px;
cursor:pointer;
background:white;
color:#4a6cf7;
font-weight:600;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

/* floating hearts */

.heart{
position:absolute;
bottom:-20px;
font-size:16px;
animation:float 7s linear infinite;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(0);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}

/* sparkle */

.sparkle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.8;
animation:sparkleMove 4s linear infinite;
}

@keyframes sparkleMove{
0%{transform:translateY(0);opacity:0}
50%{opacity:1}
100%{transform:translateY(-500px);opacity:0}
}

</style>
</head>

<body>

<div class="card">

<h1>Halo</h1>
<div class="subtitle">Untuk Dimas — someone who is often on my mind</div>

<div id="clock"></div>

<div id="text"></div>

<button onclick="showMessage()">Baca Pesannya</button>

</div>

<script>

/* pesan */

let message="Halo. Kutau pasti capekki jalani hari-harita. Tapi saya yakin bisaki lewati semuanya. Tidak perlu terburu-buru, yang penting tetap jalan. Btw semangat nah. Kalau butuh cerita atau sekadar mau didengar, selalu ja ada.";

let i=0;

function showMessage(){

let area=document.getElementById("text");
area.innerHTML="";
i=0;

let typing=setInterval(function(){

if(i<message.length){
area.innerHTML+=message.charAt(i);
i++;
}else{
clearInterval(typing);
}

},35);

}

/* jam */

function updateClock(){
let now=new Date();
let time=now.toLocaleTimeString();
document.getElementById("clock").innerHTML="Sekarang: "+time;
}

setInterval(updateClock,1000);

/* hearts */

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*14+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);
}

setInterval(createHeart,700);

/* sparkle */

function createSparkle(){
const s=document.createElement("div");
s.classList.add("sparkle");
s.style.left=Math.random()*100+"vw";

document.body.appendChild(s);

setTimeout(()=>{
s.remove();
},4000);
}

setInterval(createSparkle,300);

</script>

</body>
</html>
